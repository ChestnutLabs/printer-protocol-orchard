site_name: The Printer Protocol Orchard
site_description: >-
  Open research and implementation guidance for the LAN protocols of consumer
  3D printers.
site_author: Chestnut Labs

repo_url: https://github.com/ChestnutLabs/printer-protocol-orchard
repo_name: ChestnutLabs/printer-protocol-orchard
edit_uri: edit/main/

# CRITICAL: the existing root markdown IS the docs source. Nothing is moved.
docs_dir: .

# Because docs_dir is the repo root, the build output MUST live outside it — MkDocs
# refuses to build when site_dir is nested inside docs_dir (it would copy the build
# into itself). A sibling directory keeps that separation; the Pages workflow uploads
# this same path.
site_dir: ../_orchard_site

# Non-page files living under docs_dir are excluded so they are neither rendered as
# pages nor copied as assets. (Link integrity to fixtures/schemas is gated separately
# by scripts/check_links.py in CI, so the publish build does not run with --strict.)
exclude_docs: |
  CITATION.cff
  mkdocs.yml
  requirements*.txt
  LICENSE
  /README.md
  # ^ the ROOT README is the GitHub landing page; the site home is the card hub in
  #   index.md. The leading slash anchors this to the repo root so the section-index
  #   READMEs (protocols/README.md, patterns/README.md) are NOT also excluded.
  scripts/
  .github/
  examples/
  fixtures/
  schemas/
  includes/
  # everything else (the CLEANROOM-CHECKLIST, all protocol/pattern papers) stays a page.

theme:
  name: material
  icon:
    logo: material/sprout
    repo: fontawesome/brands/github
  features:
    - navigation.tabs          # top-level sections become a persistent tab bar
    - navigation.tabs.sticky   # tabs stay pinned when scrolling
    - navigation.sections      # group items under bold section labels in the sidebar
    - navigation.indexes       # a section's overview page IS its landing (click the tab)
    - navigation.top           # back-to-top button
    - navigation.footer        # prev/next links at the foot of each page
    - toc.follow               # right-hand TOC tracks scroll on the long papers
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.tooltips         # rich hover tooltips (used by the glossary abbreviations)
    - content.action.edit      # "edit this page" (uses edit_uri)
    - content.action.view      # "view source"
  palette:
    - scheme: default
      primary: green
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: green
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

markdown_extensions:
  - admonition
  - tables
  - abbr                       # renders *[TERM]: definition as <abbr> hover tooltips
  - attr_list
  - md_in_html                 # lets Markdown render inside the landing-page grid cards
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  # Auto-append the shared glossary abbreviations to every page so domain jargon
  # (MMU, IDEX, DSF, mTLS, SSDP, …) gets a hover definition site-wide. The file is
  # excluded from the built site (see exclude_docs) — it is an include, not a page.
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
      base_path:
        - .
  - toc:
      permalink: true
      # GitHub-compatible heading slugs (does NOT collapse the double hyphens that
      # come from `/` and `&`), so an anchor like #faults--hms resolves the same on
      # the rendered site as it does in the raw Markdown on GitHub. Kept in sync with
      # the slug algorithm in scripts/check_links.py.
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower

plugins:
  # same-dir is the purpose-built fix for keeping mkdocs.yml in the same directory
  # as the docs (docs_dir: .). It patches MkDocs' validation that otherwise aborts
  # with "docs_dir should not be the parent directory of the config file". Must load
  # before other plugins.
  - same-dir
  - search

nav:
  - Home: index.md
  - Coverage: COVERAGE.md
  - Comparison: COMPARISON.md
  - Protocols:
      - protocols/README.md
      - Anycubic: protocols/anycubic.md
      - Bambu Lab: protocols/bambu.md
      - Creality: protocols/creality.md
      - Duet / RepRapFirmware: protocols/duet.md
      - Elegoo: protocols/elegoo.md
      - FlashForge: protocols/flashforge.md
      - Klipper / Moonraker: protocols/klipper-moonraker.md
      - Marlin (USB serial): protocols/marlin-serial.md
      - OctoPrint: protocols/octoprint.md
      - PrusaLink: protocols/prusalink.md
      - Snapmaker: protocols/snapmaker.md
      - Paper template: protocols/_TEMPLATE.md
  - Patterns:
      - patterns/README.md
      - Connection flows: patterns/connection-flows.md
      - Discovery & credentials: patterns/discovery-and-credentials.md
      - Multi-material feeders: patterns/multi-material-feeders.md
      - Timing normalization: patterns/timing-normalization.md
  - Reference:
      - Method: METHOD.md
      - Glossary: GLOSSARY.md
      - Confidence grading: CONFIDENCE.md
      - Licensing: LICENSING.md
      - Disclaimer: DISCLAIMER.md
  - Contributing:
      - How to contribute: CONTRIBUTING.md
      - Clean-room checklist: CLEANROOM-CHECKLIST.md
      - For AI agents: AGENTS.md
      - Security: SECURITY.md
      - Code of conduct: CODE_OF_CONDUCT.md
  - Changelog: CHANGELOG.md
